name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      create_release_after_merge:
        description: "Create draft release after merge (true/false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      allow_incremental_on_collision:
        description: "Allow incremental bump on same-day collision (true/false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Validate contract + token access
        env:
          GH_TOKEN: ${{ secrets.BERRY_SHIELD_CI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          CONTRACT=".github/common-contract.json"
          if [ ! -f "$CONTRACT" ]; then
            echo "$CONTRACT not found. Aborting."
            exit 1
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found on runner. Aborting."
            exit 1
          fi
          if ! jq -e '.firstReleaseNotes and (.firstReleaseNotes | type == "string")' "$CONTRACT" >/dev/null; then
            echo "Invalid or missing firstReleaseNotes in $CONTRACT. Aborting."
            exit 1
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "BERRY_SHIELD_CI_TOKEN secret is required for release PR creation/edit."
            exit 1
          fi
          REPO="${{ github.repository }}"
          if ! gh repo view "$REPO" >/dev/null 2>&1; then
            TEMPLATE=".github/templates/prepare-release-token-access-error.md"
            if [ -f "$TEMPLATE" ]; then
              sed -e "s|__REPO__|$REPO|g" "$TEMPLATE"
            else
              echo "BERRY_SHIELD_CI_TOKEN cannot access repository: $REPO"
            fi
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Decide bump path
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' > /tmp/decision.env
          const fs = require("node:fs");
          const constants = fs.readFileSync("src/constants.ts", "utf8");
          const vm = constants.match(/VERSION\s*=\s*['"]([^'"]+)['"]/);
          if (!vm) {
            console.error("Unable to parse VERSION from src/constants.ts");
            process.exit(1);
          }
          const version = String(vm[1] || "");
          const m = version.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})(?:-\d+)?$/);
          if (!m) {
            console.error(`Unsupported version format: ${version}`);
            process.exit(1);
          }
          const y = Number(m[1]);
          const mo = Number(m[2]);
          const d = Number(m[3]);
          const versionDate = Date.UTC(y, mo - 1, d);
          const now = new Date();
          const todayDate = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
          if (versionDate > todayDate) {
            console.error(`Version date is in the future: ${version}`);
            process.exit(1);
          }
          const stale = versionDate < todayDate;
          const sameDay = versionDate === todayDate;
          const allowIncremental = "${{ github.event.inputs.allow_incremental_on_collision }}" === "true";
          const createRelease = "${{ github.event.inputs.create_release_after_merge }}" === "true";
          let needBump = false;
          let reason = "NO_OP";
          if (stale) {
            needBump = true;
            reason = "STALE_DATE_BUMP";
          } else if (sameDay && allowIncremental) {
            needBump = true;
            reason = "SAME_DAY_INCREMENTAL";
          } else if (sameDay && !allowIncremental && createRelease) {
            needBump = false;
            reason = "SAME_DAY_REUSE_FOR_RELEASE";
          } else {
            needBump = false;
            reason = "NO_OP";
          }
          console.log(`need_bump=${needBump ? "true" : "false"}`);
          console.log(`reason=${reason}`);
          console.log(`current_version=${version}`);
          NODE
          cat /tmp/decision.env >> "$GITHUB_OUTPUT"

      - name: Bump version when required
        if: steps.decide.outputs.need_bump == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run version:update

      - name: Resolve target version and unique branch
        id: target
        env:
          GH_TOKEN: ${{ secrets.BERRY_SHIELD_CI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ALLOW_INCREMENTAL="${{ github.event.inputs.allow_incremental_on_collision }}"
          CREATE_RELEASE="${{ github.event.inputs.create_release_after_merge }}"
          ATTEMPT=0
          MAX_ATTEMPTS=8

          while true; do
            VERSION=$(node -e "const fs=require('fs'); const c=fs.readFileSync('src/constants.ts','utf8'); const m=c.match(/VERSION\\s*=\\s*['\\\"]([^'\\\"]+)['\\\"]/); if(!m){process.exit(2)}; process.stdout.write(m[1]);")
            BRANCH="release/v${VERSION}"
            TAG="v${VERSION}"
            BRANCH_EXISTS="false"
            RELEASE_STATE="none"

            if [ "$CREATE_RELEASE" = "true" ]; then
              if gh release view "$TAG" --json isDraft >/tmp/release-state.json 2>/dev/null; then
                if jq -e '.isDraft == true' /tmp/release-state.json >/dev/null; then
                  RELEASE_STATE="draft"
                else
                  RELEASE_STATE="published"
                fi
              fi
            fi

            if [ "$CREATE_RELEASE" = "true" ] && [ "$RELEASE_STATE" = "published" ]; then
              if [ "$ALLOW_INCREMENTAL" != "true" ]; then
                echo "RELEASE_ALREADY_PUBLISHED_FOR_VERSION"
                echo "Rerun with allow_incremental_on_collision=true to create a new incremental release version."
                exit 1
              fi
              echo "Release already published for $TAG. Incremental collision is enabled; calculating next version."
              ATTEMPT=$((ATTEMPT + 1))
              if [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; then
                echo "Unable to resolve unique release version after $MAX_ATTEMPTS attempts."
                exit 1
              fi
              npm run version:update
              continue
            fi

            if git ls-remote --heads origin "$BRANCH" | grep -q .; then
              BRANCH_EXISTS="true"
            fi
            PR_NUMBER=$(gh pr list --base master --head "$BRANCH" --state open --json number --jq '.[0].number // ""')

            if [ "$CREATE_RELEASE" = "true" ] && [ "$RELEASE_STATE" = "draft" ]; then
              {
                echo "version=$VERSION"
                echo "branch=$BRANCH"
                echo "existing_pr=$PR_NUMBER"
                echo "release_state=$RELEASE_STATE"
              } >> "$GITHUB_OUTPUT"
              break
            fi

            if [ "$BRANCH_EXISTS" = "false" ]; then
              {
                echo "version=$VERSION"
                echo "branch=$BRANCH"
                echo "existing_pr=$PR_NUMBER"
                echo "release_state=$RELEASE_STATE"
              } >> "$GITHUB_OUTPUT"
              break
            fi

            if [ -n "$PR_NUMBER" ]; then
              {
                echo "version=$VERSION"
                echo "branch=$BRANCH"
                echo "existing_pr=$PR_NUMBER"
                echo "release_state=$RELEASE_STATE"
              } >> "$GITHUB_OUTPUT"
              break
            fi

            if [ "$ALLOW_INCREMENTAL" != "true" ]; then
              echo "Branch $BRANCH exists and incremental collision is disabled. Aborting."
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; then
              echo "Unable to resolve unique release version after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            npm run version:update
          done

      - name: Evaluate empty-PR skip gate (release_now)
        id: skipgate
        shell: bash
        run: |
          set -euo pipefail
          CREATE_RELEASE="${{ github.event.inputs.create_release_after_merge }}"
          ALLOW_INCREMENTAL="${{ github.event.inputs.allow_incremental_on_collision }}"
          NEED_BUMP="${{ steps.decide.outputs.need_bump }}"
          EXISTING_PR="${{ steps.target.outputs.existing_pr }}"
          RELEASE_STATE="${{ steps.target.outputs.release_state }}"
          VERSION="${{ steps.target.outputs.version }}"

          SKIP_EMPTY_PR="false"
          MARKER_HASH=""
          MARKER_COUNT="0"

          if [ "$CREATE_RELEASE" = "true" ] && [ "$ALLOW_INCREMENTAL" = "false" ] && [ "$NEED_BUMP" = "false" ] && [ -z "$EXISTING_PR" ] && [ "$RELEASE_STATE" = "none" ]; then
            CURRENT_VERSION=$(node -e "const fs=require('fs'); const c=fs.readFileSync('src/constants.ts','utf8'); const m=c.match(/VERSION\\s*=\\s*['\\\"]([^'\\\"]+)['\\\"]/); if(!m){process.exit(2)}; process.stdout.write(m[1]);")
            if [ "$CURRENT_VERSION" = "$VERSION" ]; then
              MARKER_COUNT=$(git log master --grep "^chore(version): v${VERSION}$" --format=%H | wc -l | tr -d ' ')
              MARKER_HASH=$(git log master --grep "^chore(version): v${VERSION}$" --format=%H -n 1 || true)
              if [ -n "$MARKER_HASH" ]; then
                SKIP_EMPTY_PR="true"
              fi
            fi
          fi

          echo "skip_empty_pr=$SKIP_EMPTY_PR" >> "$GITHUB_OUTPUT"
          echo "marker_hash=$MARKER_HASH" >> "$GITHUB_OUTPUT"
          echo "marker_count=$MARKER_COUNT" >> "$GITHUB_OUTPUT"

      - name: Decide action (create/update/noop)
        id: action
        shell: bash
        run: |
          set -euo pipefail
          NEED_BUMP="${{ steps.decide.outputs.need_bump }}"
          CREATE_RELEASE="${{ github.event.inputs.create_release_after_merge }}"
          EXISTING_PR="${{ steps.target.outputs.existing_pr }}"
          RELEASE_STATE="${{ steps.target.outputs.release_state }}"
          SKIP_EMPTY_PR="${{ steps.skipgate.outputs.skip_empty_pr }}"

          ACTION="noop"
          EMPTY_COMMIT="false"
          NOOP_REASON="${{ steps.decide.outputs.reason }}"
          if [ -n "$EXISTING_PR" ]; then
            ACTION="update_pr"
          elif [ "$CREATE_RELEASE" = "true" ] && [ "$RELEASE_STATE" = "draft" ]; then
            ACTION="noop"
            NOOP_REASON="DRAFT_ALREADY_EXISTS_FOR_VERSION"
          elif [ "$NEED_BUMP" = "true" ]; then
            ACTION="create_pr"
          elif [ "$CREATE_RELEASE" = "true" ] && [ "$SKIP_EMPTY_PR" = "true" ]; then
            ACTION="noop"
            NOOP_REASON="SKIP_EMPTY_PR_FORMAL_MARKER_FOUND"
          elif [ "$CREATE_RELEASE" = "true" ]; then
            ACTION="create_pr"
            EMPTY_COMMIT="true"
          else
            ACTION="noop"
          fi

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "empty_commit=$EMPTY_COMMIT" >> "$GITHUB_OUTPUT"
          echo "noop_reason=$NOOP_REASON" >> "$GITHUB_OUTPUT"

      - name: NO_OP summary
        if: steps.action.outputs.action == 'noop'
        shell: bash
        run: |
          echo "NO_OP/IDLE"
          echo "reason=${{ steps.action.outputs.noop_reason }}"
          echo "current_version=${{ steps.decide.outputs.current_version }}"
          if [ "${{ steps.action.outputs.noop_reason }}" = "SKIP_EMPTY_PR_FORMAL_MARKER_FOUND" ]; then
            echo "marker_hash=${{ steps.skipgate.outputs.marker_hash }}"
            echo "marker_count=${{ steps.skipgate.outputs.marker_count }}"
            if [ "${{ steps.skipgate.outputs.marker_count }}" != "1" ]; then
              echo "Multiple formal markers detected; using the most recent reachable marker on master."
            fi
          fi

      - name: Setup Git
        if: steps.action.outputs.action == 'create_pr'
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create release branch
        if: steps.action.outputs.action == 'create_pr'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ steps.target.outputs.branch }}"
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            echo "Release branch already exists on remote: $BRANCH"
            exit 1
          fi
          git checkout -b "$BRANCH"

      - name: Commit release changes
        if: steps.action.outputs.action == 'create_pr'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.action.outputs.empty_commit }}" = "true" ]; then
            git commit --allow-empty -m "chore(release): prepare v${{ steps.target.outputs.version }}"
          else
            git add package.json package-lock.json src/constants.ts openclaw.plugin.json
            if git diff --cached --quiet; then
              echo "No release changes detected to commit. Aborting."
              exit 1
            fi
            git commit -m "chore(release): bump version to ${{ steps.target.outputs.version }}"
          fi

      - name: Push release branch
        if: steps.action.outputs.action == 'create_pr'
        shell: bash
        run: |
          set -euo pipefail
          git push -u origin "${{ steps.target.outputs.branch }}"

      - name: Render PR body
        if: steps.action.outputs.action == 'create_pr' || steps.action.outputs.action == 'update_pr'
        id: body
        shell: bash
        run: |
          set -euo pipefail
          MODE="bump_only"
          if [ "${{ github.event.inputs.create_release_after_merge }}" = "true" ]; then
            MODE="release_now"
          fi
          TEMPLATE=".github/templates/pr-body-release.md"
          if [ ! -f "$TEMPLATE" ]; then
            echo "Template not found: $TEMPLATE"
            exit 1
          fi
          sed \
            -e "s|__MODE__|$MODE|g" \
            -e "s|__VERSION__|${{ steps.target.outputs.version }}|g" \
            -e "s|__BRANCH__|${{ steps.target.outputs.branch }}|g" \
            "$TEMPLATE" > /tmp/release-pr-body.md
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Open PR to master
        if: steps.action.outputs.action == 'create_pr'
        env:
          GH_TOKEN: ${{ secrets.BERRY_SHIELD_CI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr create \
            --base master \
            --head "${{ steps.target.outputs.branch }}" \
            --title "chore(release): v${{ steps.target.outputs.version }}" \
            --body-file /tmp/release-pr-body.md

      - name: Add repository owner as reviewer
        if: steps.action.outputs.action == 'create_pr'
        env:
          GH_TOKEN: ${{ secrets.BERRY_SHIELD_CI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list \
            --base master \
            --head "${{ steps.target.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for reviewer assignment. Skipping."
            exit 0
          fi
          REPO_OWNER="${{ github.repository_owner }}"
          for REVIEWER in "f4bioo" "$REPO_OWNER"; do
            [ -z "$REVIEWER" ] && continue
            if ! gh pr edit "$PR_NUMBER" --add-reviewer "$REVIEWER" >/dev/null 2>&1; then
              echo "Could not add reviewer @$REVIEWER automatically. Skipping without failing workflow."
            fi
          done

      - name: Update existing PR mode
        if: steps.action.outputs.action == 'update_pr'
        env:
          GH_TOKEN: ${{ secrets.BERRY_SHIELD_CI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.target.outputs.existing_pr }}"
          gh pr edit "$PR_NUMBER" \
            --title "chore(release): v${{ steps.target.outputs.version }}" \
            --body-file /tmp/release-pr-body.md

      - name: Ensure repository owner is reviewer on updated PR
        if: steps.action.outputs.action == 'update_pr'
        env:
          GH_TOKEN: ${{ secrets.BERRY_SHIELD_CI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.target.outputs.existing_pr }}"
          REPO_OWNER="${{ github.repository_owner }}"
          for REVIEWER in "f4bioo" "$REPO_OWNER"; do
            [ -z "$REVIEWER" ] && continue
            if ! gh pr edit "$PR_NUMBER" --add-reviewer "$REVIEWER" >/dev/null 2>&1; then
              echo "Could not add reviewer @$REVIEWER automatically. Skipping without failing workflow."
            fi
          done

  create-release-draft:
    name: create-release-draft
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master' && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Guard release mode
        id: guard
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail
          if printf '%s' "${PR_BODY:-}" | grep -Eiq 'Release-Mode:[[:space:]]*release_now'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Merged release PR is bump_only. Skipping draft creation."
          fi

      - name: Setup Node
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.should_release == 'true'
        run: npm ci

      - name: Read target version
        if: steps.guard.outputs.should_release == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -e "const fs=require('fs'); const c=fs.readFileSync('src/constants.ts','utf8'); const m=c.match(/VERSION\\s*=\\s*['\\\"]([^'\\\"]+)['\\\"]/); if(!m){process.exit(2)}; process.stdout.write(m[1]);")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if release already exists
        if: steps.guard.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release v${{ steps.version.outputs.version }} already exists. Aborting."
            exit 1
          fi

      - name: Create tag when missing
        if: steps.guard.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists locally."
          else
            git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          fi
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "Tag already exists on remote."
          else
            git push origin "v${{ steps.version.outputs.version }}"
          fi

      - name: Pack release assets
        if: steps.guard.outputs.should_release == 'true'
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          TGZ=$(npm pack --json | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(d[0].filename)")
          if [ -z "$TGZ" ] || [ ! -f "$TGZ" ]; then
            echo "Failed to generate npm pack artifact."
            exit 1
          fi
          sha256sum "$TGZ" > SHA256SUMS
          echo "tgz=$TGZ" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.guard.outputs.should_release == 'true'
        id: notes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("node:fs");
            const { execSync } = require("node:child_process");

            const contract = JSON.parse(fs.readFileSync(".github/common-contract.json", "utf8"));
            const first = String(contract.firstReleaseNotes || "").trim();
            const publicTypes = Array.isArray(contract?.releaseNotes?.public)
              ? contract.releaseNotes.public.map((x) => String(x).trim().toLowerCase()).filter(Boolean)
              : [];

            const tags = execSync("git tag --sort=version:refname", { encoding: "utf8" })
              .trim()
              .split("\n")
              .filter(Boolean);
            const currentTag = `v${process.env.VERSION}`;
            const previousTag = tags.filter((t) => t !== currentTag).slice(-1)[0] || null;

            if (!previousTag) {
              core.setOutput("notes", first);
              core.info("First release detected. Using firstReleaseNotes.");
              return;
            }

            const prevTagDate = execSync(`git log -1 --format=%cI ${previousTag}`, { encoding: "utf8" }).trim();
            const since = new Date(prevTagDate).getTime();

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              base: "master",
              per_page: 100,
            });

            const merged = pulls
              .filter((pr) => !!pr.merged_at)
              .filter((pr) => new Date(pr.merged_at).getTime() > since);

            const nonBot = merged.filter((pr) => {
              const login = String(pr.user?.login || "").toLowerCase();
              return !login.endsWith("[bot]");
            });

            const selected = nonBot.filter((pr) => {
              const m = String(pr.title || "").match(/^([a-z]+)(?:\([^)]*\))?:/i);
              if (!m) return false;
              return publicTypes.includes(m[1].toLowerCase());
            });

            const lines = selected.map((pr) => `- ${pr.title} (#${pr.number}) thanks @${pr.user?.login}.`);
            core.info(`Merged PRs after ${previousTag}: ${merged.length}`);
            core.info(`Filtered bot PRs: ${merged.length - nonBot.length}`);
            core.info(`Selected public PRs: ${selected.length}`);

            if (lines.length === 0) {
              core.setOutput("notes", first);
              core.info("No public PR entries found. Falling back to firstReleaseNotes.");
              return;
            }

            core.setOutput("notes", lines.join("\n"));
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create draft release
        if: steps.guard.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "v${{ steps.version.outputs.version }}" \
            "${{ steps.pack.outputs.tgz }}" \
            "SHA256SUMS" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --draft
