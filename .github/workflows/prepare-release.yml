name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: prepare
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump CalVer version
        run: npm run version:update

      - name: Validate common contract source
        shell: bash
        run: |
          CONTRACT=".github/common-contract.json"
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found on runner. Aborting."
            exit 1
          fi
          if [ ! -f "$CONTRACT" ]; then
            echo "$CONTRACT not found. Aborting."
            exit 1
          fi
          if ! jq -e '.firstReleaseNotes and (.firstReleaseNotes | type == "string")' "$CONTRACT" >/dev/null; then
            echo "Invalid or missing firstReleaseNotes in $CONTRACT. Aborting."
            exit 1
          fi

      - name: Technical gates before opening release PR
        run: |
          npm run typecheck
          npm run test
          npm run build

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Guard against existing release branch
        shell: bash
        run: |
          BRANCH="release/v${{ steps.version.outputs.version }}"
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            echo "Branch $BRANCH already exists on remote. Aborting."
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null) || true
          CONTRACT=".github/common-contract.json"
          if [ -z "$LAST_TAG" ]; then
            NOTES=$(jq -r '.firstReleaseNotes' "$CONTRACT")
          else
            NOTES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -50)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create release branch and push
        shell: bash
        run: |
          BRANCH="release/v${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json src/constants.ts
          if git diff --cached --quiet; then
            echo "No changes after version bump. Aborting."
            exit 1
          fi
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
          git push -u origin "$BRANCH"

      - name: Guard against existing PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH="release/v${{ steps.version.outputs.version }}"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR from $BRANCH already exists. Aborting."
            exit 1
          fi

      - name: Open PR to master
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH="release/v${{ steps.version.outputs.version }}"
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore(release): v${{ steps.version.outputs.version }}" \
            --body "${{ steps.changelog.outputs.notes }}"
