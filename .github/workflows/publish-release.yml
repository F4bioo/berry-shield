name: Publish Release

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Target release version/tag (example: v2026.3.1 or 2026.3.1)"
        required: true
        type: string
      confirm_publish:
        description: "Type PUBLISH_NOW to allow npm publish"
        required: true
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.workflow }}-${{ startsWith(github.event.inputs.target_version, 'v') && github.event.inputs.target_version || format('v{0}', github.event.inputs.target_version) }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Validate secrets and inputs
        id: input
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is not configured. Aborting."
            exit 1
          fi
          if [ "${{ github.event.inputs.confirm_publish }}" != "PUBLISH_NOW" ]; then
            echo "Publish confirmation missing or invalid."
            echo "Set confirm_publish to: PUBLISH_NOW"
            exit 1
          fi
          RAW="${{ github.event.inputs.target_version }}"
          if [ -z "$RAW" ]; then
            echo "target_version is required."
            exit 1
          fi
          if [[ "$RAW" =~ ^v[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(-[0-9]+)?$ ]]; then
            TAG="$RAW"
          elif [[ "$RAW" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(-[0-9]+)?$ ]]; then
            TAG="v$RAW"
          else
            echo "Invalid target_version format: $RAW"
            echo "Expected: vYYYY.M.D(-N) or YYYY.M.D(-N)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "target_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "target_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve target draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.input.outputs.target_tag }}"
          if ! gh release view "$TAG" --json tagName,isDraft,name > /tmp/release.json 2>/tmp/release-view.err; then
            if grep -Eiq "not found|404" /tmp/release-view.err; then
              echo "No release found for target $TAG. Aborting (fail-closed)."
            elif grep -Eiq "forbidden|403|rate limit|429|timed out|timeout|couldn.t connect|connection|network" /tmp/release-view.err; then
              echo "Unable to read release state for $TAG due to auth/rate-limit/network error. Aborting (fail-closed)."
            else
              echo "Unable to read release state for $TAG. Aborting (fail-closed)."
            fi
            cat /tmp/release-view.err || true
            exit 1
          fi
          IS_DRAFT=$(jq -r '.isDraft' /tmp/release.json)
          if [ "$IS_DRAFT" != "true" ]; then
            echo "Target release $TAG exists but is not draft. Aborting (fail-closed)."
            jq '{tag:.tagName, name:.name, isDraft:.isDraft}' /tmp/release.json
            exit 1
          fi

      - name: Download target draft assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.input.outputs.target_tag }}"
          mkdir -p .release-assets
          gh release download "$TAG" --dir .release-assets --clobber
          ls -la .release-assets

      - name: Validate target assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.input.outputs.target_version }}"
          cd .release-assets
          mapfile -t TGZ_FILES < <(find . -maxdepth 1 -type f -name '*.tgz' -printf '%f\n' | sort)
          TGZ_COUNT="${#TGZ_FILES[@]}"
          if [ "$TGZ_COUNT" -ne 1 ]; then
            echo "Expected exactly 1 .tgz asset, found $TGZ_COUNT. Aborting."
            exit 1
          fi
          if [ ! -f SHA256SUMS ]; then
            echo "SHA256SUMS asset not found. Aborting."
            exit 1
          fi
          TGZ_FILE="${TGZ_FILES[0]}"
          if ! grep -Fq "  $TGZ_FILE" SHA256SUMS; then
            echo "SHA256SUMS does not contain an entry for $TGZ_FILE. Aborting (fail-closed)."
            cat SHA256SUMS || true
            exit 1
          fi
          sha256sum -c SHA256SUMS
          if ! PKG_VERSION=$(tar -xOf "$TGZ_FILE" package/package.json | jq -r '.version'); then
            echo "Unable to read package version from $TGZ_FILE. Aborting (fail-closed)."
            tar -tf "$TGZ_FILE" | head -n 20 || true
            exit 1
          fi
          if [ -z "$PKG_VERSION" ] || [ "$PKG_VERSION" = "null" ]; then
            echo "Package version in $TGZ_FILE is empty/null. Aborting (fail-closed)."
            exit 1
          fi
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "Asset version mismatch: found $PKG_VERSION, expected $VERSION. Aborting (fail-closed)."
            exit 1
          fi
          echo "tgz=.release-assets/$TGZ_FILE" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Fail if version already exists on npm
        shell: bash
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').name")
          VERSION="${{ steps.input.outputs.target_version }}"
          if npm view "${PKG}@${VERSION}" version >/tmp/npm-view.out 2>/tmp/npm-view.err; then
            echo "Version ${PKG}@${VERSION} already exists on npm. Aborting."
            exit 1
          fi
          if grep -Eiq 'E401|401|E403|403|E5[0-9]{2}|5[0-9]{2}|timed out|timeout|ENOTFOUND|ECONN|network' /tmp/npm-view.err; then
            echo "Unable to verify npm version state due to auth/network/server error. Aborting (fail-closed)."
            cat /tmp/npm-view.err || true
            exit 1
          fi
          if ! grep -Eiq 'E404|404|not found' /tmp/npm-view.err; then
            echo "Unable to verify npm version state with confidence. Aborting (fail-closed)."
            cat /tmp/npm-view.err || true
            exit 1
          fi

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          npm publish "${{ steps.assets.outputs.tgz }}" --access public

      - name: Promote draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "${{ steps.input.outputs.target_tag }}" --draft=false
          echo "Published and promoted: ${{ steps.input.outputs.target_tag }}"
