name: CI

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Version sync check (constants VERSION == package.json version)
        run: |
          node <<'NODE'
          const fs = require("fs");
          const constants = fs.readFileSync("src/constants.ts", "utf8");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const match = constants.match(/export const VERSION\s*=\s*"([^"]+)"/);

          if (!match) {
            console.error("VERSION constant not found in src/constants.ts");
            process.exit(1);
          }

          const constantsVersion = match[1];
          const packageVersion = pkg.version;

          if (constantsVersion !== packageVersion) {
            console.error(`Version mismatch: constants=${constantsVersion} package.json=${packageVersion}`);
            process.exit(1);
          }

          console.log(`Version sync OK: ${constantsVersion}`);
          NODE

      - name: Wiki sanity
        run: npm run wiki:claim

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify build artifact
        shell: bash
        run: |
          if [ ! -f dist/index.js ]; then
            echo "dist/index.js not found after build"
            exit 1
          fi
          echo "Build artifact OK: dist/index.js exists"

      - name: Package dry-run
        run: npm pack --dry-run
