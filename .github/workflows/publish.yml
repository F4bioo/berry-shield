name: Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: normal
        type: choice
        options:
          - normal
          - reconcile
      version:
        description: "Target version (optional, defaults to package.json version)"
        required: false
        type: string
      confirm_publish:
        description: "Type PUBLISH_NOW to allow npm publish steps"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-master
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate NPM_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is not configured. Aborting."
            exit 1
          fi

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifact
        shell: bash
        run: |
          if [ ! -f dist/index.js ]; then
            echo "dist/index.js not found after build"
            exit 1
          fi
          echo "Build artifact OK"

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate mode input
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" != "normal" ] && [ "$MODE" != "reconcile" ]; then
            echo "Invalid mode '$MODE'. Allowed: normal, reconcile."
            exit 1
          fi

      - name: Detect release state (fail-closed)
        id: state
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE="${{ steps.version.outputs.package }}"
          OWNER_REPO="${{ github.repository }}"
          OWNER="${OWNER_REPO%%/*}"
          REPO="${OWNER_REPO##*/}"

          retry_cmd() {
            local attempts="$1"
            local delay="$2"
            shift 2
            local n=1
            while [ "$n" -le "$attempts" ]; do
              if "$@"; then
                return 0
              fi
              if [ "$n" -eq "$attempts" ]; then
                return 1
              fi
              sleep "$delay"
              delay=$((delay * 2))
              n=$((n + 1))
            done
          }

          # npm state (yes/no or fail-closed)
          if retry_cmd 3 2 npm view "${PACKAGE}@${VERSION}" version >/tmp/npm_view.out 2>/tmp/npm_view.err; then
            NPM_PUBLISHED="yes"
          else
            if grep -Eiq 'E404|404|not found' /tmp/npm_view.err; then
              NPM_PUBLISHED="no"
            else
              echo "Unable to determine release state with confidence. Aborting (fail-closed). Retry workflow."
              cat /tmp/npm_view.err || true
              exit 1
            fi
          fi

          # tag state
          if ! retry_cmd 3 2 git ls-remote --tags origin "refs/tags/v${VERSION}" >/tmp/tag_view.out 2>/tmp/tag_view.err; then
            echo "Unable to determine release state with confidence. Aborting (fail-closed). Retry workflow."
            cat /tmp/tag_view.err || true
            exit 1
          fi
          if grep -q . /tmp/tag_view.out; then
            TAG_EXISTS="yes"
          else
            TAG_EXISTS="no"
          fi

          # release state (no/draft/published or fail-closed)
          if retry_cmd 3 2 gh api "repos/${OWNER}/${REPO}/releases/tags/v${VERSION}" >/tmp/release_view.json 2>/tmp/release_view.err; then
            if jq -e '.draft == true' /tmp/release_view.json >/dev/null; then
              RELEASE_STATE="draft"
            else
              RELEASE_STATE="published"
            fi
          else
            if grep -Eiq '404|not found' /tmp/release_view.err; then
              RELEASE_STATE="no"
            else
              echo "Unable to determine release state with confidence. Aborting (fail-closed). Retry workflow."
              cat /tmp/release_view.err || true
              exit 1
            fi
          fi

          echo "npm_published=$NPM_PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "release_state=$RELEASE_STATE" >> "$GITHUB_OUTPUT"
          echo "Detected state: npm=$NPM_PUBLISHED tag=$TAG_EXISTS release=$RELEASE_STATE"

      - name: Decide execution plan
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          NPM_STATE="${{ steps.state.outputs.npm_published }}"
          TAG_STATE="${{ steps.state.outputs.tag_exists }}"
          RELEASE_STATE="${{ steps.state.outputs.release_state }}"

          CREATE_TAG="false"
          CREATE_DRAFT="false"
          PUBLISH_NPM="false"
          PROMOTE="false"
          NOOP="false"
          NEEDS_PACK="false"

          if [ "$NPM_STATE" = "yes" ] && [ "$TAG_STATE" = "no" ]; then
            echo "Invalid state: npm is published but tag is missing. Manual intervention required before reconcile."
            exit 1
          fi

          if [ "$MODE" = "normal" ]; then
            if [ "$NPM_STATE" = "no" ] && [ "$TAG_STATE" = "no" ] && [ "$RELEASE_STATE" = "no" ]; then
              CREATE_TAG="true"
              CREATE_DRAFT="true"
              PUBLISH_NPM="true"
              PROMOTE="true"
              NEEDS_PACK="true"
            else
              echo "Invalid state for mode=normal. Use mode=reconcile to complete partial release metadata safely."
              exit 1
            fi
          else
            if [ "$NPM_STATE" = "yes" ] && [ "$TAG_STATE" = "yes" ] && [ "$RELEASE_STATE" = "published" ]; then
              NOOP="true"
            elif [ "$NPM_STATE" = "yes" ] && [ "$TAG_STATE" = "yes" ] && [ "$RELEASE_STATE" = "draft" ]; then
              PROMOTE="true"
            elif [ "$NPM_STATE" = "no" ] && [ "$TAG_STATE" = "yes" ] && [ "$RELEASE_STATE" = "draft" ]; then
              PUBLISH_NPM="true"
              PROMOTE="true"
              NEEDS_PACK="true"
            elif [ "$NPM_STATE" = "no" ] && [ "$TAG_STATE" = "yes" ] && [ "$RELEASE_STATE" = "no" ]; then
              CREATE_DRAFT="true"
              PUBLISH_NPM="true"
              PROMOTE="true"
              NEEDS_PACK="true"
            elif [ "$NPM_STATE" = "no" ] && [ "$TAG_STATE" = "no" ] && [ "$RELEASE_STATE" = "no" ]; then
              echo "Invalid state for mode=reconcile. No partial metadata found; use mode=normal."
              exit 1
            else
              echo "Unable to determine release transition for mode=$MODE and state npm=$NPM_STATE tag=$TAG_STATE release=$RELEASE_STATE."
              exit 1
            fi
          fi

          echo "create_tag=$CREATE_TAG" >> "$GITHUB_OUTPUT"
          echo "create_draft=$CREATE_DRAFT" >> "$GITHUB_OUTPUT"
          echo "publish_npm=$PUBLISH_NPM" >> "$GITHUB_OUTPUT"
          echo "promote=$PROMOTE" >> "$GITHUB_OUTPUT"
          echo "noop=$NOOP" >> "$GITHUB_OUTPUT"
          echo "needs_pack=$NEEDS_PACK" >> "$GITHUB_OUTPUT"

      - name: Guard against duplicate tag in normal mode
        if: ${{ steps.decide.outputs.create_tag == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "Tag v${{ steps.version.outputs.version }} already exists on remote. Aborting."
            exit 1
          fi

      - name: Require explicit publish confirmation
        if: ${{ steps.decide.outputs.publish_npm == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm_publish }}" != "PUBLISH_NOW" ]; then
            echo "Publish confirmation missing or invalid."
            echo "Set confirm_publish to: PUBLISH_NOW"
            exit 1
          fi

      - name: Validate CI strings source
        if: ${{ steps.decide.outputs.needs_pack == 'true' || steps.decide.outputs.create_draft == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          STRINGS=".github/ci-strings.json"
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found on runner. Aborting."
            exit 1
          fi
          if [ ! -f "$STRINGS" ]; then
            echo "$STRINGS not found. Aborting."
            exit 1
          fi
          if ! jq -e '.first_release_notes and (.first_release_notes | type == "string")' "$STRINGS" >/dev/null; then
            echo "Invalid or missing first_release_notes in $STRINGS. Aborting."
            exit 1
          fi

      - name: Pack npm artifact
        if: ${{ steps.decide.outputs.needs_pack == 'true' }}
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          TGZ=$(npm pack --json | node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(data[0].filename);")
          if [ -z "$TGZ" ] || [ ! -f "$TGZ" ]; then
            echo "Failed to generate npm pack artifact. Aborting."
            exit 1
          fi
          sha256sum "$TGZ" > SHA256SUMS
          echo "tgz=$TGZ" >> "$GITHUB_OUTPUT"
          echo "sha=SHA256SUMS" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        if: ${{ steps.decide.outputs.create_tag == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate release notes
        if: ${{ steps.decide.outputs.create_draft == 'true' }}
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAGS=($(git tag --sort=-version:refname))
          STRINGS=".github/ci-strings.json"
          if [ ${#TAGS[@]} -le 1 ]; then
            NOTES=$(jq -r '.first_release_notes' "$STRINGS")
          else
            PREV_TAG="${TAGS[1]}"
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -50)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release
        if: ${{ steps.decide.outputs.create_draft == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "v${{ steps.version.outputs.version }}" \
            "${{ steps.pack.outputs.tgz }}" \
            "${{ steps.pack.outputs.sha }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --draft

      - name: Publish to NPM
        if: ${{ steps.decide.outputs.publish_npm == 'true' }}
        run: npm publish "${{ steps.pack.outputs.tgz }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Promote draft release
        if: ${{ steps.decide.outputs.promote == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "v${{ steps.version.outputs.version }}" --draft=false

      - name: No-op (already reconciled)
        if: ${{ steps.decide.outputs.noop == 'true' }}
        run: |
          echo "No-op idempotent state: release already published and reconciled."
