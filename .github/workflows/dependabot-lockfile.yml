name: Dependabot Lockfile Heal

on:
  pull_request:
    branches:
      - master

concurrency:
  group: dependabot-lockfile-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  heal-lockfile:
    name: heal-lockfile
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      - name: Guard one-shot heal
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          LAST_AUTHOR="$(git log -1 --pretty=%an)"
          LAST_EMAIL="$(git log -1 --pretty=%ae)"
          LAST_SUBJECT="$(git log -1 --pretty=%s)"

          if [ "$LAST_AUTHOR" = "berry-shield-app[bot]" ] && \
             [ "$LAST_EMAIL" = "berry-shield-app[bot]@users.noreply.github.com" ] && \
             [ "$LAST_SUBJECT" = "ci(bot): apply dependabot workflow heal" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate lockfile
        if: steps.guard.outputs.skip != 'true'
        run: npm install

      - name: Install clean dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Typecheck
        if: steps.guard.outputs.skip != 'true'
        run: npm run typecheck

      - name: Tests
        if: steps.guard.outputs.skip != 'true'
        run: npm test

      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: npm run build

      - name: Package dry-run
        if: steps.guard.outputs.skip != 'true'
        run: npm pack --dry-run

      - name: Detect tracked changes
        id: changes
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BERRY_SHIELD_APP_ID }}
          private-key: ${{ secrets.BERRY_SHIELD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Commit healed changes
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "berry-shield-app[bot]"
          git config user.email "berry-shield-app[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci(bot): apply dependabot workflow heal"

      - name: Push healed changes
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${PR_HEAD_REF}"

      - name: Comment success on PR
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "🧑‍🏭 Applied the workflow heal for this Dependabot PR. Awaiting review."
