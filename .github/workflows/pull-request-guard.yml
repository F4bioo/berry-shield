name: Pull Request Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PR title and description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = (pr?.title || "").trim();
            const body = (pr?.body || "").trim();
            const baseRef = (pr?.base?.ref || "").trim();
            const headRef = (pr?.head?.ref || "").trim();
            const minBodyChars = 20;
            const minTitleDescChars = 20;
            const fs = require("node:fs");
            const contractPath = ".github/common-contract.json";
            const commentTemplatePath = ".github/templates/pr-guard-failure-comment.md";
            let allowedTypes = [];
            let releaseTitlePattern;
            let releaseHeadPattern;
            let commentTemplate = "";

            try {
              const contract = JSON.parse(fs.readFileSync(contractPath, "utf8"));
              const publicTypes = Array.isArray(contract?.releaseNotes?.public) ? contract.releaseNotes.public : [];
              const internalTypes = Array.isArray(contract?.releaseNotes?.internal) ? contract.releaseNotes.internal : [];
              allowedTypes = [...new Set([...publicTypes, ...internalTypes].map((t) => String(t).trim().toLowerCase()).filter(Boolean))];
              if (allowedTypes.length === 0) {
                throw new Error("releaseNotes.public/internal are empty or missing");
              }
              releaseTitlePattern = new RegExp(contract.releaseTitlePattern);
              releaseHeadPattern = new RegExp(contract.releaseHeadPattern);
            } catch (err) {
              core.setFailed(`Unable to load ${contractPath}: ${err?.message || String(err)}`);
              return;
            }

            try {
              commentTemplate = fs.readFileSync(commentTemplatePath, "utf8");
            } catch (err) {
              core.setFailed(`Unable to load ${commentTemplatePath}: ${err?.message || String(err)}`);
              return;
            }

            const errors = [];
            let titleInvalid = false;
            let bodyInvalid = false;

            if (baseRef === "master") {
              if (!releaseHeadPattern.test(headRef)) {
                errors.push("PRs targeting `master` must come from a release branch named `release/vYYYY.M.D` (optional `-N`).");
                errors.push("Example head branch: `release/v2026.2.28`.");
                titleInvalid = true;
              }

              if (!releaseTitlePattern.test(title)) {
                errors.push("PRs targeting `master` must use release title format: `chore(release): vYYYY.M.D` (optional `-N`).");
                errors.push("Valid: `chore(release): v2026.2.28`.");
                errors.push("Invalid: `chore(release): publish berry-shield version 2026.2.28`.");
                titleInvalid = true;
              }
            } else {
              if (title.length === 0) {
                errors.push("Title is empty.");
                errors.push("Use: `type(scope): description`.");
                errors.push("Example: `fix(cli): handle missing command argument in help output`.");
                titleInvalid = true;
              } else {
                const colonIndex = title.indexOf(":");
                if (colonIndex === -1) {
                  errors.push("Title is missing `:` separator.");
                  errors.push("Valid: `docs(cli): clarify init command behavior and expected output`.");
                  errors.push("Invalid: `docs(cli) clarify init command behavior and expected output`.");
                  titleInvalid = true;
                } else {
                  const header = title.slice(0, colonIndex).trim();
                  const description = title.slice(colonIndex + 1).trim();
                  const headerMatch = header.match(/^([a-z]+)(?:\(([a-z0-9._\-\/]+)\))?$/i);

                  if (!headerMatch) {
                    errors.push("Title header must match `type` or `type(scope)` before `:`.");
                    errors.push("Valid: `refactor(layer): split validation logic into smaller pure functions`.");
                    errors.push("Invalid: `refactor layer: split validation logic into smaller pure functions`.");
                    titleInvalid = true;
                  } else {
                    const type = headerMatch[1].toLowerCase();
                    if (!allowedTypes.includes(type)) {
                      errors.push(`Invalid title type: \`${type}\`. Allowed: ${allowedTypes.join(", ")}.`);
                      titleInvalid = true;
                    }
                  }

                  if (description.length < minTitleDescChars) {
                    errors.push(`Title description too short: got ${description.length}, expected at least ${minTitleDescChars} characters.`);
                    errors.push("Too short: `feat(cli): add logs`.");
                    errors.push("Good: `feat(cli): add detailed output for release health diagnostics`.");
                    titleInvalid = true;
                  }
                }
              }
            }

            if (body.length < minBodyChars) {
              errors.push(`PR body must have at least ${minBodyChars} characters.`);
              errors.push("Tip: include one short summary line and one validation line.");
              errors.push("Example: `Summary: adjust CI trigger. Validation: edited PR description and confirmed checks reran.`");
              bodyInvalid = true;
            }

            const marker = "<!-- berry-pr-quality -->";
            const fixHint = titleInvalid && bodyInvalid
              ? "Please update PR title and body, then save PR edits (or push new commits)."
              : titleInvalid
                ? "Please update PR title, then save PR edits (or push new commits)."
                : "Please update PR body, then save PR edits (or push new commits).";

            const message = commentTemplate
              .replace("__ERRORS__", errors.map((e) => `- ${e}`).join("\n"))
              .replace("__FIX_HINT__", fixHint);

            let previous = null;
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              previous = comments.find(c =>
                c.user?.type === "Bot" && typeof c.body === "string" && c.body.includes(marker)
              ) || null;
            } catch (err) {
              core.warning(`Unable to read PR comments: ${err?.message || String(err)}`);
            }

            if (errors.length > 0) {
              if (previous) {
                try {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: previous.id,
                    body: message,
                  });
                } catch (err) {
                  core.warning(`Unable to update PR comment: ${err?.message || String(err)}`);
                }
              } else {
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body: message,
                  });
                } catch (err) {
                  core.warning(`Unable to create PR comment: ${err?.message || String(err)}`);
                }
              }
              core.setFailed("PR quality checks failed.");
              return;
            }

            if (previous) {
              try {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: previous.id,
                  body: `${marker}\nPR quality check passed.`,
                });
              } catch (err) {
                core.warning(`Unable to update PR success comment: ${err?.message || String(err)}`);
              }
            }
